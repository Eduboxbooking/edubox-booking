<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Edu Box Booking</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">

    <!-- Title -->
    <h1>Edu Box booking</h1>

    <!-- Step indicator -->
    <div class="steps">
      <span class="step active" id="step-label-1">Date</span>
      <span class="divider">——</span>
      <span class="step" id="step-label-2">Slot</span>
      <span class="divider">——</span>
      <span class="step" id="step-label-3">Details</span>
    </div>

    <!-- STEP 1: Date -->
    <div id="step1">
      <p class="range-note">Bookings open <strong>Apr 29 – Jul 6, 2026</strong> · Sun–Thu</p>
      <div class="calendar-card">
        <div class="cal-header">
          <button id="prev-month">‹</button>
          <span id="month-label"></span>
          <button id="next-month">›</button>
        </div>
        <div class="day-names">
          <span>Su</span><span>Mo</span><span>Tu</span>
          <span>We</span><span>Th</span><span>Fr</span><span>Sa</span>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
      </div>
      <p class="hint">Tap any highlighted date to pick a time.</p>
      <p class="admin-link">Admin page: <a href="admin/index.html">/admin</a></p>
    </div>

    <!-- STEP 2: Time -->
    <div id="step2" class="hidden">
      <div class="back-row">
        <button class="back-btn" onclick="goToStep(1)">‹</button>
        <div>
          <div class="big-text" id="selected-date-label"></div>
          <div class="sub-text">Select a booking slot</div>
        </div>
      </div>
      <div class="time-grid" id="time-grid"></div>
    </div>

    <!-- STEP 3: Details -->
    <div id="step3" class="hidden">
      <div class="back-row">
        <button class="back-btn" onclick="goToStep(2)">‹</button>
        <div class="big-text">Your details</div>
      </div>
      <div class="summary-card">
        <div id="summary-date"></div>
        <div id="summary-time"></div>
      </div>
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="input-name" placeholder="Jane Doe" />
      </div>
      <div class="field">
        <label>Phone number</label>
        <input type="text" id="input-phone" placeholder="+971 50 123 4567" />
      </div>
      <div class="field">
        <label>Faculty</label>
        <input type="text" id="input-faculty" placeholder="e.g. Faculty of Architecture" />
      </div>
      <div class="field">
        <label>What would you like to borrow?</label>
        <div class="device-row">
          <div class="device-card" onclick="selectDevice(this, 'iPad')">
            <div class="device-icon">📱</div>
            <div>iPad</div>
          </div>
          <div class="device-card" onclick="selectDevice(this, 'Laptop')">
            <div class="device-icon">💻</div>
            <div>Laptop</div>
          </div>
          <div class="device-card" onclick="selectDevice(this, 'Headphones')">
            <div class="device-icon">🎧</div>
            <div>Headphones</div>
          </div>
        </div>
      </div>
      <div class="field">
        <label>Reason for booking</label>
        <textarea id="input-reason" placeholder="Tell us briefly what you'll be working on..."></textarea>
      </div>
      <button class="confirm-btn" id="confirm-btn" onclick="confirmBooking()">Confirm booking</button>
    </div>

    <!-- STEP 4: Confirmation -->
    <div id="step4" class="hidden">
      <div class="confirm-box">
        <div style="font-size:44px; text-align:center;">✅</div>
        <p class="big-text" style="text-align:center;">Booking confirmed!</p>
        <p class="confirm-line" id="confirm-date"></p>
        <p class="confirm-line" id="confirm-time"></p>
        <p class="confirm-line" id="confirm-device"></p>\
        <p class="confirm-line" id="confirm-name"></p>
        <button class="confirm-btn" onclick="resetBooking()">Book another</button>
      </div>
    </div>

  </div>

  <script>
    var currentStep = 1;
    var selectedDate = null;
    var selectedTime = null;
    var selectedDevice = null;
    var bookingData = {};
    var bookingAvailability = {};
    var BOOKING_START = new Date(2026, 3, 29);
    var BOOKING_END = new Date(2026, 6, 6);
    var currentViewDate = new Date(2026, 4, 1);

    function initializeCalendar() {
      renderCalendar(currentViewDate);
    }

    function renderCalendar(date) {
      var year = date.getFullYear();
      var month = date.getMonth();
      var monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
      document.getElementById('month-label').textContent = monthNames[month] + ' ' + year;
      
      var calGrid = document.getElementById('cal-grid');
      calGrid.innerHTML = '';
      
      var firstDay = new Date(year, month, 1).getDay();
      var daysInMonth = new Date(year, month + 1, 0).getDate();
      var today = new Date();
      today.setHours(0, 0, 0, 0);
      
      for (var i = 0; i < firstDay; i++) {
        var emptyCell = document.createElement('div');
        emptyCell.className = 'cal-day empty';
        calGrid.appendChild(emptyCell);
      }
      
      for (var day = 1; day <= daysInMonth; day++) {
        var cellDate = new Date(year, month, day);
        var cell = document.createElement('div');
        cell.className = 'cal-day';
        cell.textContent = day;
        
        var isWithinBookingRange = cellDate >= BOOKING_START && cellDate <= BOOKING_END;
        var isWeekday = cellDate.getDay() >= 0 && cellDate.getDay() <= 4;
        var isInTheFuture = cellDate >= today;
        var isBookable = isWithinBookingRange && isWeekday && isInTheFuture;
        
        if (isBookable) {
          cell.classList.add('bookable');
          cell.addEventListener('click', (function(d) { return function() { selectDate(d); }; })(cellDate));
        } else {
          cell.classList.add('disabled');
        }
        
        if (selectedDate && cellDate.toDateString() === selectedDate.toDateString()) {
          cell.classList.add('selected');
        }
        
        calGrid.appendChild(cell);
      }
    }

    function previousMonth() {
      currentViewDate = new Date(currentViewDate.getFullYear(), currentViewDate.getMonth() - 1);
      renderCalendar(currentViewDate);
    }

    function nextMonth() {
      currentViewDate = new Date(currentViewDate.getFullYear(), currentViewDate.getMonth() + 1);
      renderCalendar(currentViewDate);
    }

    function selectDate(date) {
      selectedDate = date;
      selectedTime = null;
      bookingData.date = date;
      renderCalendar(currentViewDate);
      var options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      document.getElementById('selected-date-label').textContent = date.toLocaleDateString('en-US', options);
      goToStep(2);
    }

    function goToStep(step) {
      for (var i = 1; i <= 4; i++) {
        document.getElementById('step' + i).classList.add('hidden');
      }
      
      document.getElementById('step' + step).classList.remove('hidden');
      updateStepIndicators(step);
      
      currentStep = step;
      
      if (step === 2) {
        renderTimeGrid();
      } else if (step === 3) {
        renderDetailsStep();
      }
    }

    function updateStepIndicators(step) {
      for (var i = 1; i <= 3; i++) {
        var label = document.getElementById('step-label-' + i);
        if (i < step) {
          label.classList.add('completed');
          label.classList.remove('active');
        } else if (i === step) {
          label.classList.add('active');
          label.classList.remove('completed');
        } else {
          label.classList.remove('active', 'completed');
        }
      }
    }

    function renderTimeGrid() {
      var timeGrid = document.getElementById('time-grid');
      timeGrid.innerHTML = '';
      
      if (!selectedDate) {
        return;
      }

      var dateKey = selectedDate.toISOString().slice(0, 10);
      if (!bookingAvailability[dateKey]) {
        bookingAvailability[dateKey] = {
          '09:00 AM': 10,
          '10:00 AM': 10,
          '11:00 AM': 10,
          '12:00 PM': 10,
          '01:00 PM': 10,
          '02:00 PM': 10,
          '03:00 PM': 10,
          '04:00 PM': 10
        };
      }

      var times = ['09:00 AM', '10:00 AM', '11:00 AM', '12:00 PM', '01:00 PM', '02:00 PM', '03:00 PM', '04:00 PM'];
      
      times.forEach(function(time) {
        var available = bookingAvailability[dateKey][time];
        var btn = document.createElement('button');
        btn.className = 'time-slot';
        btn.innerHTML = '<span class="slot-name">' + time + '</span>' +
                        '<span class="slot-availability">' + available + ' of 10 left</span>';
        
        if (selectedTime === time) {
          btn.classList.add('selected');
        }
        
        if (available === 0) {
          btn.disabled = true;
          btn.classList.add('disabled');
        } else {
          btn.addEventListener('click', (function(t) { return function() { selectTime(t); }; })(time));
        }
        
        timeGrid.appendChild(btn);
      });
    }

    function selectTime(time) {
      selectedTime = time;
      bookingData.time = time;
      renderTimeGrid();
      goToStep(3);
    }

    function renderDetailsStep() {
      var options = { weekday: 'short', month: 'short', day: 'numeric' };
      var dateStr = selectedDate.toLocaleDateString('en-US', options);
      
      document.getElementById('summary-date').textContent = 'Date: ' + dateStr;
      document.getElementById('summary-time').textContent = 'Booking slot: ' + selectedTime;
      
      document.getElementById('input-name').value = '';
      document.getElementById('input-phone').value = '';
      document.getElementById('input-faculty').value = '';
      document.getElementById('input-reason').value = '';
      selectedDevice = null;
      
      var cards = document.querySelectorAll('.device-card');
      for (var i = 0; i < cards.length; i++) {
        cards[i].classList.remove('selected');
      }
    }

    async function saveAdminBooking(entry) {
      var response = await fetch('/api/bookings', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(entry)
      });
      if (!response.ok) {
        var error = await response.json().catch(function() { return { error: 'Server error' }; });
        throw new Error(error.error || 'Booking save failed');
      }
      return await response.json();
    }

    function selectDevice(element, device) {
      var cards = document.querySelectorAll('.device-card');
      for (var i = 0; i < cards.length; i++) {
        cards[i].classList.remove('selected');
      }
      
      element.classList.add('selected');
      selectedDevice = device;
      bookingData.device = device;
    }

    async function confirmBooking() {
      var name = document.getElementById('input-name').value.trim();
      var phone = document.getElementById('input-phone').value.trim();
      var faculty = document.getElementById('input-faculty').value.trim();
      var reason = document.getElementById('input-reason').value.trim();
      
      if (!name) {
        alert('Please enter your name');
        return;
      }
      
      if (!phone) {
        alert('Please enter your phone number');
        return;
      }
      
      if (!faculty) {
        alert('Please enter your faculty');
        return;
      }
      
      if (!selectedDevice) {
        alert('Please select a device');
        return;
      }
      
      if (!reason) {
        alert('Please tell us your booking reason');
        return;
      }
      
      bookingData.name = name;
      bookingData.phone = phone;
      bookingData.faculty = faculty;
      bookingData.reason = reason;
      
      var dateKey = selectedDate.toISOString().slice(0, 10);
      if (bookingAvailability[dateKey] && bookingAvailability[dateKey][selectedTime] > 0) {
        bookingAvailability[dateKey][selectedTime] -= 1;
      }

      try {
        await saveAdminBooking({
          date: dateKey,
          time: selectedTime,
          device: selectedDevice,
          name: bookingData.name,
          phone: bookingData.phone,
          faculty: bookingData.faculty,
          reason: bookingData.reason,
          savedAt: new Date().toISOString()
        });
      } catch (error) {
        alert('Unable to save booking: ' + error.message);
        return;
      }
      
      goToStep(4);
      var options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      var dateStr = selectedDate.toLocaleDateString('en-US', options);
      
      document.getElementById('confirm-date').textContent = '📅 ' + dateStr;
      document.getElementById('confirm-time').textContent = '🕐 Booking slot: ' + selectedTime;
      document.getElementById('confirm-device').textContent = '📦 ' + selectedDevice;
      document.getElementById('confirm-name').textContent = '👤 ' + bookingData.name;
    }

    function resetBooking() {
      currentStep = 1;
      selectedDate = null;
      selectedTime = null;
      selectedDevice = null;
      bookingData = {};
      currentViewDate = new Date(2026, 4, 1);
      
      goToStep(1);
      renderCalendar(currentViewDate);
    }

    document.addEventListener('DOMContentLoaded', function() {
      initializeCalendar();
      document.getElementById('prev-month').addEventListener('click', previousMonth);
      document.getElementById('next-month').addEventListener('click', nextMonth);
    });
  </script>
</body>
</html>
